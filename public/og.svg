<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow-blue" cx="15%" cy="-5%" r="55%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-violet" cx="92%" cy="-5%" r="45%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1b1f26" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <radialGradient id="grid-fade" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="grid-mask">
      <rect width="1200" height="630" fill="url(#grid-fade)"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="#fbfaf7"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-mask)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-violet)"/>

  <line x1="0" y1="130" x2="1200" y2="130" stroke="#1b1f26" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="525" x2="1200" y2="525" stroke="#1b1f26" stroke-opacity="0.08" stroke-width="1"/>

  <g transform="translate(96 170)">
