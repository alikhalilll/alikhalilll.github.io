<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0b0d10" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#fafafa" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <mask id="grid-mask">
      <rect width="1200" height="630" fill="url(#grid-fade)"/>
    </mask>
    <radialGradient id="grid-fade" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-mask)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(96 96)">
    <rect width="96" height="96" rx="14" fill="url(#brand)"/>
    <text
      x="48"
      y="66"
      font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
      font-size="40"
      font-weight="800"
      letter-spacing="-1.5"
      text-anchor="middle"
      fill="#09090b"
    >AK</text>
    <text
      x="120"
      y="42"
      font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
      font-size="22"
      font-weight="600"
      fill="#fafafa"
    >Ali Khalil</text>
    <text
      x="120"
      y="72"
      font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
      font-size="16"
      font-weight="500"
      fill="#a1a1aa"
      letter-spacing="0.5"
    >alikhalilll.github.io</text>
  </g>

  <g transform="translate(96 280)">
    <text
      font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
      font-size="84"
      font-weight="800"
      letter-spacing="-3"
      fill="#fafafa"
    >
      <tspan x="0" y="0" fill="url(#brand)">Senior Frontend</tspan>
      <tspan x="0" y="92">Developer &amp; Lead.</tspan>
    </text>
    <text
      x="0"
      y="170"
      font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
      font-size="24"
      font-weight="400"
      fill="#a1a1aa"
      letter-spacing="-0.2"
    >Vue · Nuxt · TypeScript · Real-time SaaS · RTL/LTR design systems</text>
  </g>

  <g transform="translate(96 540)" font-family="'Inter', ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <circle cx="22" cy="18" r="4" fill="#22d3ee"/>
    <text x="38" y="24" font-size="14" font-weight="500" fill="#fafafa">Open to Riyadh roles</text>

    <rect x="232" y="0" width="220" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <circle cx="254" cy="18" r="4" fill="#a78bfa"/>
    <text x="270" y="24" font-size="14" font-weight="500" fill="#fafafa">2× Employee of the Month</text>
  </g>
</svg>
